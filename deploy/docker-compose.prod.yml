name: ${COMPOSE_PROJECT_NAME:-market}

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market}
      POSTGRES_USER: ${POSTGRES_USER:-market}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market} -d ${POSTGRES_DB:-market}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-market}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-marketing}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?set SECRET_ENCRYPTION_KEY in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      UPLOAD_API_KEY: ${UPLOAD_API_KEY:?set UPLOAD_API_KEY in .env}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-market_session}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-strict}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS in .env}
      ENABLE_LOCAL_PREVIEW: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend-output:/app/output
    networks:
      - internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edge
      - internal
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    image: caddy:2.8.4-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      MARKET_DOMAIN: ${MARKET_DOMAIN:?set MARKET_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 6

networks:
  edge:
  internal:
    internal: true

volumes:
  pgdata:
  backend-output:
  caddy-data:
  caddy-config:
