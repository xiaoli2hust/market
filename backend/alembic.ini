[alembic]
# Alembic 迁移脚本目录（相对于本文件所在目录）。
script_location = migrations

# 迁移文件命名模板。
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 时区
timezone = UTC

# 通过环境变量注入 sqlalchemy.url；env.py 会回退到 settings.DATABASE_URL。
sqlalchemy.url =

# 比对类型，支持枚举/默认值变化检测。
compare_type = true
compare_server_default = true

[post_write_hooks]
# 可选：在生成迁移后自动 black 格式化（默认关闭）。
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
